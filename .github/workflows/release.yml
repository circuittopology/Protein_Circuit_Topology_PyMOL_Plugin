name: Lint and Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    container:
      image: astral/uv:0.10.10-python3.13-alpine3.23

    steps:
      - name: Install Git
        run: apk add --no-cache git

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Ruff
        run: |
          uvx ruff check --exit-zero .

      - name: Build plugin package
        id: package
        env:
          ASSET_NAME: protein-circuit-topology-pymol-plugin.zip
        run: |
          git archive \
          --format=zip \
          --prefix=proteinct_plugin/ \
          --output="${ASSET_NAME}" \
          HEAD \
          analysis \
          functions \
          tabs \
          utils \
          __init__.py \
          gui_class.py \
          initialization_checks.py \
          setup.py \
          requirements.yml \
          LICENSE

          echo "zip_file=${ASSET_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Publish download links
        env:
          ASSET_NAME: protein-circuit-topology-pymol-plugin.zip
        run: |
          {
            echo "Latest download: https://github.com/${{ github.repository }}/releases/latest/download/${ASSET_NAME}"
            echo "Versioned release page: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.zip_file }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}