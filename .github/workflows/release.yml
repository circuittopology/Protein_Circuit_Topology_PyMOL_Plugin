name: Lint and Release

on:
  push:
    tags:
      - '*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    container:
      image: astral/uv:0.10.10-python3.12-trixie-slim
    
    permissions:
      contents: write

    steps:
      - name: Install Git
        run: apt-get update && apt-get install -y --no-install-recommends git

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Miniforge
        run: |
          apt-get install -y --no-install-recommends curl ca-certificates
          curl -fsSL -o Miniforge3.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
          bash Miniforge3.sh -b -p /opt/conda
          echo "/opt/conda/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          /opt/conda/bin/conda install -y -c conda-forge -c schrodinger pymol-bundle

      - name: Run Ruff
        run: |
          uvx ruff check --exit-zero

      - name: Zip Repository & Generate Checksum
        id: zip
        run: |
          FILENAME="release-${{ github.ref_name }}.zip"

          # (ignores .git and .gitignore automatically)
          git archive --format=zip --output="$FILENAME" HEAD

          sha256sum "$FILENAME" > "$FILENAME.sha256"

          echo "zip_file=$FILENAME" >> $GITHUB_OUTPUT
          echo "checksum_file=$FILENAME.sha256" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.zip.outputs.zip_file }}
            ${{ steps.zip.outputs.checksum_file }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}